version: "4.2"
description: "MSW acquisition namespace: subject > session > acquisition > file."
hierarchy:
  - subject
  - session
  - acquisition
  - file
optional_levels: []

# Subject field validators: used by parse_subject / make_subject.
# A structured subject is: {subject_id}_{animal_id}[_{extra_field}...]
# fields[0] (tag_id by convention) is the physical tag when present.
validators:
  subject_id:
    pattern: "[A-Za-z]+[0-9]+"
    description: "Lab/experiment label, e.g. t004, seq001. Letters then digits."
  animal_id:
    pattern: "[A-Za-z][0-9]+"
    description: "Central registry ID, e.g. m2045, r001. Single letter then digits."
  extra_field:
    pattern: "[A-Za-z0-9]+"
    description: "Extra subject token, e.g. 4A7B, batch2. Alphanumeric."

levels:
  subject:
    template: "{subject}"
    regex: "(?P<subject>[\\w\\-]+)"
    optional_fields: []
  session:
    template: "{subject}__{datetime}__{session_type}"
    regex: "(?P<subject>[\\w\\-]+)__(?P<datetime>\\d{8}_\\d{6}(?:_\\d{6})?)(?:__(?P<session_type>[\\w\\-]+))?"
    optional_fields: [session_type]
  acquisition:
    template: "{subject}__{datetime}__{acq_type}"
    regex: "(?P<subject>[\\w\\-]+)__(?P<datetime>\\d{8}_\\d{6}(?:_\\d{6})?)__(?P<acq_type>[\\w\\-]+)"
    optional_fields: []
  file:
    template: "{acquisition}.msw.{artifact}"
    regex: "(?P<acquisition>.+)\\.msw\\.(?P<artifact>.+)"
    optional_fields: []
