version: "4.0"
description: "MSW acquisition namespace: subject > session > acquisition > file."
hierarchy:
  - subject
  - session
  - acquisition
  - file
optional_levels: []
levels:
  subject:
    template: "{subject}"
    regex: "(?P<subject>[\\w\\-]+)"
    optional_fields: []
  session:
    template: "{subject}__{datetime}"
    regex: "(?P<subject>[\\w\\-]+)__(?P<datetime>\\d{8}_\\d{6}(?:_\\d{6})?)"
    optional_fields: []
  acquisition:
    template: "{subject}__{datetime}__{acq_type}"
    regex: "(?P<subject>[\\w\\-]+)__(?P<datetime>\\d{8}_\\d{6}(?:_\\d{6})?)__(?P<acq_type>[\\w\\-]+)"
    optional_fields: []
  file:
    template: "{acquisition}.msw.{artifact}"
    regex: "(?P<acquisition>.+)\\.msw\\.(?P<artifact>.+)"
    optional_fields: []
